<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sutra - إنشاء حساب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dark-mode">

  <div class="container small">
    <div class="auth-box">
      <h1 class="logo">Sutra</h1>
      <p class="subtitle">إنشاء حساب جديد</p>

      <form id="signup-form">
        <div class="input-group">
          <label for="signup-name">الاسم</label>
          <input type="text" id="signup-name" placeholder="اسمك الكامل" required/>
        </div>
        <div class="input-group">
          <label for="signup-email">الإيميل</label>
          <input type="email" id="signup-email" placeholder="example@email.com" required/>
        </div>
        <div class="input-group">
          <label for="signup-password">كلمة المرور</label>
          <input type="password" id="signup-password" placeholder="********" required minlength="6"/>
        </div>
        <div class="input-group">
          <label for="signup-confirm">تأكيد كلمة المرور</label>
          <input type="password" id="signup-confirm" placeholder="********" required/>
        </div>
        <button type="submit" class="main-btn">إنشاء الحساب</button>
      </form>

      <p class="switch-auth">
        لديك حساب؟ <a href="login.html">تسجيل الدخول</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
