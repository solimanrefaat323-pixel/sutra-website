<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sutra - تسجيل الدخول</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dark-mode">

  <div class="container small">
    <div class="auth-box">
      <h1 class="logo">Sutra</h1>
      <p class="subtitle">تسجيل الدخول</p>

      <div class="social-buttons">
        <button class="social-btn google"><i class="fab fa-google"></i> جوجل</button>
        <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</button>
        <button class="social-btn instagram"><i class="fab fa-instagram"></i> إنستغرام</button>
      </div>

      <div class="divider"><span>أو</span></div>

      <form id="login-form">
        <div class="input-group">
          <label for="login-email">الإيميل</label>
          <input type="email" id="login-email" placeholder="example@email.com" required/>
        </div>
        <div class="input-group">
          <label for="login-password">كلمة المرور</label>
          <input type="password" id="login-password" placeholder="********" required/>
        </div>
        <div class="options">
          <label><input type="checkbox"/> تذكرني</label>
          <a href="#" class="forgot">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="main-btn">تسجيل الدخول</button>
      </form>

      <p class="switch-auth">
        ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
