<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sutra - مقاسك المثالي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dark-mode">

  <button id="theme-toggle" class="theme-btn" title="تبديل الوضع">
    <i class="fas fa-moon"></i>
  </button>

  <div class="container">
    <div class="profile-box">
      <h1 class="logo">Sutra</h1>
      <p class="subtitle">ادخل بياناتك لنقترح المقاس المناسب</p>

      <form id="size-form">
        <div class="input-group">
          <label for="height">الطول (سم)</label>
          <input type="number" id="height" placeholder="مثال: 175" min="140" max="220" required/>
        </div>
        <div class="input-group">
          <label for="weight">الوزن (كجم)</label>
          <input type="number" id="weight" placeholder="مثال: 70" min="40" max="150" required/>
        </div>
        <div class="input-group">
          <label for="age">العمر (سنة)</label>
          <input type="number" id="age" placeholder="مثال: 28" min="16" max="90" required/>
        </div>
        <button type="submit" class="main-btn suggest-btn">اقترح المقاس</button>
      </form>

      <div id="result" class="result hidden"></div>

      <button id="logout-btn" class="logout">تسجيل الخروج</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
